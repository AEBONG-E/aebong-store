<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout-admin}">
<head>
    <meta charset="UTF-8">
    <title>상품 정보</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- individual CSS -->
    <th:block layout:fragment="css">
        <style>
            body {
                font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
                color: #333;
                background-color: #ffffff;
            }

            .form-section {
                margin-bottom: 2rem;
                padding: 1.5rem;
                background: white;
                border-radius: 8px;
                box-shadow: 0 0 6px rgba(0, 0, 0, 0.05);
            }

            .form-label {
                font-weight: 500;
            }

            .form-title {
                margin-bottom: 2rem;
                font-size: 1.75rem;
                font-weight: bold;
                color: #222;
            }

            .info-label {
                font-weight: 600;
                color: #555;
                font-size: 0.875rem;
                margin-bottom: 0.25rem;
            }

            .info-value {
                font-size: 1rem;
                color: #222;
                padding: 0.5rem 0;
                border-bottom: 1px solid #eee;
            }

            .info-value:last-child {
                border-bottom: none;
            }

            .badge-product-type {
                font-size: 0.85rem;
                padding: 0.4rem 0.75rem;
            }

            .image-thumbnail {
                width: 120px;
                height: 120px;
                object-fit: cover;
                border-radius: 8px;
                border: 1px solid #ddd;
                cursor: pointer;
                transition: transform 0.2s;
            }

            .image-thumbnail:hover {
                transform: scale(1.05);
            }

            .price-table th {
                background-color: #f8f9fa;
                font-weight: 600;
            }

            .description-box {
                background-color: #f8f9fa;
                border-radius: 6px;
                padding: 1rem;
                min-height: 80px;
                white-space: pre-wrap;
            }
        </style>
    </th:block>
</head>

<div layout:fragment="content">
    <div class="container-fluid px-5 py-4">

        <!-- 페이지 헤더 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="form-title mb-0">상품 정보</h2>
            <div>
                <a th:href="@{/products}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-list"></i> 목록
                </a>
                <a th:href="@{/products/edit/{id}(id=${product.productId})}" class="btn btn-outline-primary me-2">
                    <i class="bi bi-pencil"></i> 수정
                </a>
                <button type="button" class="btn btn-outline-danger" id="btnDelete">
                    <i class="bi bi-trash"></i> 삭제
                </button>
            </div>
        </div>

        <!-- 기본 정보 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white fw-semibold d-flex justify-content-between align-items-center">
                <span>기본 정보</span>
                <span class="badge bg-primary badge-product-type" th:text="${product.productType}">STANDARD</span>
            </div>
            <div class="card-body bg-white">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 ID</div>
                        <div class="info-value" th:text="${product.productId}">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 코드</div>
                        <div class="info-value" th:text="${product.productCode}">-</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품명</div>
                        <div class="info-value fw-bold" th:text="${product.productName}">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 영문명</div>
                        <div class="info-value" th:text="${product.productEnglishName} ?: '-'">-</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 약칭</div>
                        <div class="info-value" th:text="${product.productShortName} ?: '-'">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">제조국</div>
                        <div class="info-value" th:text="${product.manufacturerCountry} ?: '-'">-</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">출시 일시</div>
                        <div class="info-value" th:text="${#temporals.format(product.releaseDatetime, 'yyyy-MM-dd HH:mm')} ?: '-'">-</div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="info-label">상품 기본설명</div>
                    <div class="description-box" th:text="${product.basicDescription} ?: '등록된 기본설명이 없습니다.'">-</div>
                </div>

                <div class="mb-3">
                    <div class="info-label">상품 상세설명</div>
                    <div class="description-box" th:text="${product.detailDescription} ?: '등록된 상세설명이 없습니다.'">-</div>
                </div>
            </div>
        </div>

        <!-- 가격 정보 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white fw-semibold">
                가격 정보
            </div>
            <div class="card-body bg-white p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 price-table">
                        <thead>
                            <tr>
                                <th class="text-center" style="width: 50px;">#</th>
                                <th>적용 시작일</th>
                                <th>적용 종료일</th>
                                <th class="text-end">판매가</th>
                                <th class="text-end">매입가</th>
                                <th class="text-center">할인 유형</th>
                                <th class="text-end">할인 금액</th>
                                <th class="text-end">할인율(%)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${product.priceList == null or product.priceList.empty}">
                                <td colspan="8" class="text-center text-muted py-4">등록된 가격 정보가 없습니다.</td>
                            </tr>
                            <tr th:each="price, stat : ${product.priceList}">
                                <td class="text-center" th:text="${stat.index + 1}">1</td>
                                <td th:text="${price.applyStartDate}">-</td>
                                <td th:text="${price.applyEndDate}">-</td>
                                <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(price.salesAmount, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(price.purchaseAmount, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                                <td class="text-center">
                                    <span class="badge"
                                          th:classappend="${price.discountType.name() == 'NONE'} ? 'bg-secondary' : 'bg-success'"
                                          th:text="${price.discountType}">NONE</span>
                                </td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(price.discountAmount, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                                <td class="text-end" th:text="${price.discount} + '%'">0%</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 이미지 정보 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white fw-semibold">
                이미지 정보
            </div>
            <div class="card-body bg-white">
                <div th:if="${product.imageList == null or product.imageList.empty}" class="text-center text-muted py-4">
                    등록된 이미지가 없습니다.
                </div>
                <div th:unless="${product.imageList == null or product.imageList.empty}" class="row g-3">
                    <div class="col-auto" th:each="image : ${product.imageList}">
                        <div class="card" style="width: 150px;">
                            <img th:src="${image.imageFileUrl}"
                                 th:alt="${image.imageFileName}"
                                 class="image-thumbnail card-img-top"
                                 data-bs-toggle="modal"
                                 data-bs-target="#imageModal"
                                 th:data-image-url="${image.imageFileUrl}">
                            <div class="card-body p-2">
                                <p class="card-text small text-truncate mb-1" th:text="${image.originalImageFileName}">image.jpg</p>
                                <span class="badge bg-info" th:text="${image.imageType}">MAIN</span>
                                <small class="text-muted d-block" th:text="${image.width} + ' x ' + ${image.height}">100x100</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 버튼 -->
        <div class="d-flex justify-content-between">
            <a th:href="@{/products}" class="btn btn-secondary px-4">
                목록으로
            </a>
            <div>
                <a th:href="@{/products/edit/{id}(id=${product.productId})}" class="btn btn-primary px-4 me-2">
                    수정하기
                </a>
                <button type="button" class="btn btn-danger px-4" id="btnDeleteBottom">
                    삭제하기
                </button>
            </div>
        </div>

    </div>

    <!-- 이미지 확대 모달 -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="imageModalLabel">이미지 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="상품 이미지" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        const productId = [[${product.productId}]];
    </script>
    <script th:src="@{/js/products/product-info.js}"></script>
</th:block>
</html>
