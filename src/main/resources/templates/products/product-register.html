<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout-admin}">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- individual CSS -->
    <th:block layout:fragment="css">
        <style>
            body {
                font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
                color: #333;
                background-color: #ffffff;
            }

            .form-section {
                margin-bottom: 2rem;
                padding: 1.5rem;
                background: white;
                border-radius: 8px;
                box-shadow: 0 0 6px rgba(0, 0, 0, 0.05);
            }

            .form-label {
                font-weight: 500;
            }

            .form-title {
                margin-bottom: 2rem;
                font-size: 1.75rem;
                font-weight: bold;
                color: #222;
            }
        </style>
    </th:block>
    <!-- individual CSS -->
</head>

<div layout:fragment="content">
    <div class="container-fluid px-5 py-4">
        <h2 class="form-title mb-4">상품 등록</h2>

        <form name="formObj" id="form">

            <!-- 기본 정보 -->
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-dark text-white fw-semibold">
                    기본 정보
                </div>
                <div class="card-body bg-white">

                    <div class="mb-3">
                        <label for="productCode" class="form-label">상품 코드</label>
                        <input type="text" class="form-control" id="productCode" name="productCode" required>
                    </div>

                    <div class="mb-3">
                        <label for="productType" class="form-label">상품 유형</label>
                        <select class="form-select" id="productType" name="productType" required>
                            <option value="STANDARD">기본</option>
                            <option value="MAIN_OPTION">메인옵션</option>
                            <option value="UNIT_OPTION">단위옵션</option>
                            <option value="SET">세트</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="productName" class="form-label">상품명</label>
                            <input type="text" class="form-control" id="productName" name="productName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="productEnglishName" class="form-label">상품 영문명</label>
                            <input type="text" class="form-control" id="productEnglishName" name="productEnglishName">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="productShortName" class="form-label">상품 약칭</label>
                        <input type="text" class="form-control" id="productShortName" name="productShortName">
                    </div>

                    <div class="mb-3">
                        <label for="basicDescription" class="form-label">상품 기본설명</label>
                        <textarea class="form-control" id="basicDescription" name="basicDescription" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="detailDescription" class="form-label">상품 상세설명</label>
                        <textarea class="form-control" id="detailDescription" name="detailDescription" rows="4"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="manufacturerCountry" class="form-label">제조국</label>
                            <input type="text" class="form-control" id="manufacturerCountry" name="manufacturerCountry">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="releaseDatetime" class="form-label">출시 일시</label>
                            <input type="datetime-local" class="form-control" id="releaseDatetime" name="releaseDatetime">
                        </div>
                    </div>

                </div>
            </div>

            <!-- 가격 정보 -->
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-secondary text-white fw-semibold">
                    가격 정보
                </div>
                <div class="card-body bg-white">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price.applyStartDate" class="form-label">가격 적용 시작일자</label>
                            <input type="date" class="form-control" id="price.applyStartDate" name="price.applyStartDate">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price.applyEndDate" class="form-label">가격 적용 종료일자</label>
                            <input type="date" class="form-control" id="price.applyEndDate" name="price.applyEndDate">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price.salesAmount" class="form-label">판매가</label>
                            <input type="number" class="form-control" id="price.salesAmount" name="price.salesAmount">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price.purchaseAmount" class="form-label">매입가</label>
                            <input type="number" class="form-control" id="price.purchaseAmount" name="price.purchaseAmount">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="price.discountType" class="form-label">할인 유형</label>
                            <select class="form-select" id="price.discountType" name="price.discountType">
                                <option value="NONE">없음</option>
                                <option value="COUPON">쿠폰 할인</option>
                                <option value="MEMBERSHIP">멤버쉽 할인</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="price.discountAmount" class="form-label">할인 금액</label>
                            <input type="number" class="form-control" id="price.discountAmount" name="price.discountAmount">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="price.discount" class="form-label">할인율(%)</label>
                            <input type="number" class="form-control" id="price.discount" name="price.discount">
                        </div>
                    </div>

                </div>
            </div>

            <!-- 이미지 등록 -->
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-dark text-white fw-semibold">
                    이미지 등록
                </div>
                <div class="card-body bg-white">
                    <div class="mb-3">
                        <label class="form-label">이미지 파일 업로드</label>
                        <input type="file" class="form-control" name="imageFiles" multiple>
                        <small class="text-muted">여러 장 업로드 가능</small>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button id="btnForm" type="submit" class="btn btn-dark px-4">등록</button>
            </div>
        </form>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:src="@{/js/products/product-register.js}"></script>
</th:block>

</html>
