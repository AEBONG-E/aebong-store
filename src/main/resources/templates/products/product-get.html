<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout-admin}">
<head>
    <meta charset="UTF-8">
    <title>상품 정보</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <th:block layout:fragment="css">
        <style>
            .form-title {
                margin-bottom: 1.5rem;
                font-size: 1.5rem;
                font-weight: 700;
            }

            .info-label {
                font-weight: 600;
                color: #555;
                font-size: 0.875rem;
                margin-bottom: 0.25rem;
            }

            .info-value {
                font-size: 1rem;
                color: #222;
                padding: 0.5rem 0;
                border-bottom: 1px solid #eee;
                min-height: 2.5rem;
            }

            .description-box {
                background-color: #f8f9fa;
                border-radius: 6px;
                padding: 1rem;
                min-height: 80px;
                white-space: pre-wrap;
            }

            .image-thumbnail {
                width: 120px;
                height: 120px;
                object-fit: cover;
                border-radius: 8px;
                border: 1px solid #ddd;
            }
        </style>
    </th:block>
</head>

<div layout:fragment="content" th:attr="data-product-id=${productId}" id="productView">
    <div class="container-fluid px-5 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="form-title mb-0">상품 정보</h2>
            <div>
                <a th:href="@{/products/modify}" class="btn btn-secondary">수정</a>
                <a th:href="@{/products/list}" class="btn btn-outline-secondary">목록</a>
            </div>
        </div>

        <div class="alert alert-danger d-none" id="errorBox"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white fw-semibold">기본 정보</div>
            <div class="card-body bg-white">
                <div class="row">
                    <input type="hidden" id="productId"/>

                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 코드</div>
                        <div class="info-value" id="productCode">-</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품명</div>
                        <div class="info-value" id="productName">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 영문명</div>
                        <div class="info-value" id="productEnglishName">-</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 약칭</div>
                        <div class="info-value" id="productShortName">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">제조국</div>
                        <div class="info-value" id="manufacturerCountry">-</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="info-label">상품 유형</div>
                        <div class="info-value" id="productType">-</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="info-label">출시 일시</div>
                        <div class="info-value" id="releaseDatetime">-</div>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="info-label">상품 기본설명</div>
                    <div class="description-box" id="basicDescription">-</div>
                </div>
                <div class="mb-3">
                    <div class="info-label">상품 상세설명</div>
                    <div class="description-box" id="detailDescription">-</div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white fw-semibold">가격 정보</div>
            <div class="card-body bg-white p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="text-center" style="width: 50px;">No</th>
                            <th>적용 시작일</th>
                            <th>적용 종료일</th>
                            <th class="text-end">판매가</th>
                            <th class="text-end">매입가</th>
                            <th class="text-center">할인 유형</th>
                            <th class="text-end">할인 금액</th>
                            <th class="text-end">할인율(%)</th>
                        </tr>
                        </thead>
                        <tbody id="priceTableBody">
                        <tr>
                            <td colspan="8" class="text-center text-muted py-4">등록된 가격 정보가 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white fw-semibold">이미지 정보</div>
            <div class="card-body bg-white">
                <div class="row g-3" id="imageGallery">
                    <div class="col-12 text-center text-muted py-4">등록된 이미지가 없습니다.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:src="@{/js/products/product-get.js}"></script>
</th:block>
</html>
