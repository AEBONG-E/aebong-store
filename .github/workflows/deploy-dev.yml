name: Deploy DEV

on:
  push:
    branches:
      - dev

env:
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  RESOURCE_PATH: ./src/main/resources/application-dev.yml
  CODE_DEPLOY_APPLICATION_NAME: ecommerce-app
  CODE_DEPLOY_DEPLOYMENT_GROUP_NAME: ecommerce-dev-dg
  DEPLOY_ENV: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set environment variables
        run: |
          echo "DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}" >> $GITHUB_ENV
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> $GITHUB_ENV
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> $GITHUB_ENV
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV

      - name: Replace database values in YAML
        run: |
          sed -i "s|\${DB_ENDPOINT}|${DB_ENDPOINT}|g" ${{ env.RESOURCE_PATH }}
          sed -i "s|\${DB_PORT}|${DB_PORT}|g" ${{ env.RESOURCE_PATH }}
          sed -i "s|\${DB_USERNAME}|${DB_USERNAME}|g" ${{ env.RESOURCE_PATH }}
          sed -i "s|\${DB_PASSWORD}|${DB_PASSWORD}|g" ${{ env.RESOURCE_PATH }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Create deploy bundle
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/
          cp -r scripts appspec.yml deploy/
          echo "${{ env.DEPLOY_ENV }}" > deploy/profile
          cd deploy && zip -r ../deploy.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: aws s3 cp deploy.zip s3://$S3_BUCKET_NAME/dev/deploy.zip

      - name: Deploy to CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.CODE_DEPLOY_APPLICATION_NAME }} \
            --deployment-group-name ${{ env.CODE_DEPLOY_DEPLOYMENT_GROUP_NAME }} \
            --s3-location bucket=$S3_BUCKET_NAME,bundleType=zip,key=dev/deploy.zip
